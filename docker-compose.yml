services:
  fda-server:
    build: .
    container_name: fda-server
    ports:
      - "8000:8000"
    volumes:
      - ./config.json:/app/config.json
      - workspace-data:/app/workspace
      - user-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  workspace-data:
  user-data:
